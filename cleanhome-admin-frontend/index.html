<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanHome Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- Elementos decorativos de fondo -->
  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>

  <main class="app-shell">
    <!-- Cabecera principal del panel -->
    <header class="topbar">
      <div>
        <p class="eyebrow">Panel Administrativo</p>
        <h1>CleanHome</h1>
      </div>
      <div class="topbar-actions">
        <span id="sessionInfo" class="session-pill">Sesion no iniciada</span>
        <button id="logoutBtn" class="btn ghost" type="button">Salir</button>
      </div>
    </header>

    <!-- Vista de login (visible cuando no hay sesion) -->
    <section id="loginView" class="card login-card">
      <h2>Ingreso de Administrador</h2>
      <p class="muted">Usa una cuenta con rol <strong>Admin</strong> para gestionar solicitudes y servicios.</p>

      <form id="loginForm" class="form-grid">
        <label>
          API Base
          <input id="baseApiInput" type="text" placeholder="http://localhost:3000/api" required>
        </label>
        <label>
          Correo
          <input id="correoInput" type="email" placeholder="admin@cleanhome.com" required>
        </label>
        <label>
          Contrasena
          <input id="passwordInput" type="password" placeholder="********" required>
        </label>
        <button class="btn primary" type="submit">Iniciar Sesion</button>
      </form>
    </section>

    <!-- Dashboard admin (visible cuando hay sesion) -->
    <section id="dashboardView" class="dashboard hidden">
      <!-- Modulo de gestion de solicitudes -->
      <article class="card">
        <div class="card-head">
          <h2>Solicitudes</h2>
          <button id="reloadSolicitudesBtn" class="btn secondary" type="button">Recargar</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Servicio</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Estado</th>
                <th>Personal</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="solicitudesTableBody"></tbody>
          </table>
        </div>
      </article>

      <!-- Modulo de gestion de servicios -->
      <article class="card">
        <div class="card-head">
          <h2>Servicios</h2>
          <button id="reloadServiciosBtn" class="btn secondary" type="button">Recargar</button>
        </div>

        <form id="servicioForm" class="form-grid compact">
          <input id="servicioIdInput" type="hidden">
          <label>
            Nombre
            <input id="servicioNombreInput" type="text" required>
          </label>
          <label>
            Duracion
            <input id="servicioDuracionInput" type="text" placeholder="2 a 4 horas">
          </label>
          <label class="full">
            Descripcion
            <textarea id="servicioDescripcionInput" rows="2"></textarea>
          </label>
          <label>
            Precio (USD)
            <input id="servicioPrecioInput" type="number" min="0" step="0.01" required>
          </label>
          <label class="checkline">
            <input id="servicioActivoInput" type="checkbox" checked>
            Activo
          </label>
          <div class="form-actions full">
            <button class="btn primary" type="submit">Guardar Servicio</button>
            <button id="clearServicioBtn" class="btn ghost" type="button">Limpiar</button>
          </div>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="serviciosTableBody"></tbody>
          </table>
        </div>
      </article>
    </section>

    <!-- Barra de mensajes de estado -->
    <p id="statusLine" class="status-line">Listo para iniciar sesion.</p>
  </main>

  <script src="./app.js"></script>
</body>
</html>
